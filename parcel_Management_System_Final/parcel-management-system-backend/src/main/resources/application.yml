server:
  port: 8082
spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:parcel_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:parcelx.demo.mail@example.com}
    password: ${MAIL_PASSWORD:replace-with-demo-mail-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
parcel:
  app:
    name: Parcel Management System
  security:
    jwt:
      secret: ${JWT_SECRET:Mybigasssecretkey333333333}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
