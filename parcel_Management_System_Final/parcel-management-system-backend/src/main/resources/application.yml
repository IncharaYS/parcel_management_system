server:
  port: 8082
spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://localhost:3306/${DB_NAME:parcel_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
parcel:
  app:
    name: Parecel Management Syatem
  security:
    jwt:
      secret: ${JWT_SECRET:Mybigasssecretkey333333333}
      expiration-ms: ${JWT_EXPIRATION_MS:3600000}
